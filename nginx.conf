events {}

http {
  include       mime.types;
  default_type  application/octet-stream;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /static/ {
      try_files $uri =404;
    }
  }
}